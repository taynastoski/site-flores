<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flores Online</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>

        <div class="menu">
            ☰
            <div class="dropdown">
                <a href="#">Início</a>
                <a href="#">Minhas Compras</a>
                <a href="#">Recomendações</a>
                <a href="#">Contato</a>
            </div>
        </div>

        <div class="pesquisa">
            <input type="text" placeholder="Pesquisar flores...">
        </div>

        <div class="logo">
            🌸 <span>Flores</span>
        </div>

    </header>

    <section class="banner">
        <img src="imagens/banner.jpg" alt="Banner Flores">
    </section>

    <section class="produtos">

        <div class="card">
            <img src="imagens/rosa.jpg" alt="Buquê de Rosas">
            <h3>Buquê de Rosas Vermelhas</h3>
            <p class="preco">R$ 79,90</p>
            <a href="#" class="comprar">Comprar</a>
        </div>

        <div class="card">
            <img src="imagens/girassol.jpg" alt="Girassóis">
            <h3>Buquê de Girassóis</h3>
            <p class="preco">R$ 69,90</p>
            <a href="#" class="comprar">Comprar</a>
        </div>

        <div class="card">
            <img src="imagens/orquidea.jpg" alt="Orquídea">
            <h3>Orquídea Premium</h3>
            <p class="preco">R$ 99,90</p>
            <a href="#" class="comprar">Comprar</a>
        </div>

        <div class="card">
            <img src="imagens/tulipa.jpg" alt="Tulipas">
            <h3>Buquê de Tulipas</h3>
            <p class="preco">R$ 89,90</p>
            <a href="#" class="comprar">Comprar</a>
        </div>

        <div class="card">
            <img src="imagens/rosa.jpg" alt="Rosas Brancas">
            <h3>Rosas Brancas Elegantes</h3>
            <p class="preco">R$ 74,90</p>
            <a href="#" class="comprar">Comprar</a>
        </div>

        <div class="card">
            <img src="imagens/girassol.jpg" alt="Mix Floral">
            <h3>Mix Floral Especial</h3>
            <p class="preco">R$ 119,90</p>
            <a href="#" class="comprar">Comprar</a>
        </div>

    </section>

</body>
</html>
